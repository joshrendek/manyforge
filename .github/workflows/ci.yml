name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build
        run: make build
      - name: Vet / lint
        run: make lint
      - name: Test
        run: make test
      - name: Security regression
        run: make sec-test
