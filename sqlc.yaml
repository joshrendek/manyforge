version: "2"
sql:
  - engine: postgresql
    schema: db/schema.sql
    queries: db/query
    gen:
      go:
        package: dbgen
        out: internal/platform/db/dbgen
        sql_package: pgx/v5
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_interface: true
        overrides:
          - db_type: citext
            go_type: string
          - db_type: uuid
            go_type:
              import: github.com/google/uuid
              type: UUID
          - db_type: timestamptz
            go_type:
              import: time
              type: Time
