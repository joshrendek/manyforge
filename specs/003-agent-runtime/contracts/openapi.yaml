openapi: 3.1.0
info:
  title: manyforge Agent Runtime API
  version: 0.1.0
  description: >
    Spec 003 — Agent Runtime & AI Gateway. US2 surface: business-bound agent
    definition CRUD, gated by the agents.configure permission. Authorization and
    existence are indistinguishable — a lacking permission or an invisible business
    returns the same 404 as an unknown id (no existence oracle).
servers:
  - url: /api/v1
security:
  - bearerAuth: []
paths:
  /businesses/{id}/agents:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: listAgents
      summary: List agent definitions for a business
      responses:
        "200":
          description: Agent list
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentList" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      operationId: createAgent
      summary: Create an agent definition (creates its agent principal)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateAgentRequest" }
      responses:
        "201":
          description: Created agent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Agent" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /businesses/{id}/agents/tools:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: listAgentTools
      summary: List the tool catalog available to agents (read-only descriptors)
      responses:
        "200":
          description: Tool catalog
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentToolList" }
        "404": { $ref: "#/components/responses/NotFound" }
  /businesses/{id}/agents/models:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: listAgentModels
      summary: List the model catalog available to agents
      responses:
        "200":
          description: Model catalog
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentModelList" }
        "404": { $ref: "#/components/responses/NotFound" }
  /businesses/{id}/agents/provider-models/{provider}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: provider, in: path, required: true, schema: { type: string } }
    get:
      operationId: listAgentProviderModels
      summary: List a provider's live model catalog (e.g. OpenRouter) for the agent model picker
      responses:
        "200":
          description: Provider model catalog (degrades to an empty list when unavailable)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentModelList" }
        "404": { $ref: "#/components/responses/NotFound" }
  /businesses/{id}/agents/{agentID}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: agentID, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: getAgent
      summary: Get one agent definition
      responses:
        "200":
          description: Agent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Agent" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateAgent
      summary: Partially update an agent definition
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateAgentRequest" }
      responses:
        "200":
          description: Updated agent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Agent" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
    delete:
      operationId: deleteAgent
      summary: Delete an agent definition and its agent principal
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }
  /businesses/{id}/mcp_servers:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: listMCPServers
      summary: List MCP servers for a business
      responses:
        "200":
          description: MCP server list
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MCPServerList" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      operationId: createMCPServer
      summary: Create an MCP server connection record
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateMCPServerRequest" }
      responses:
        "201":
          description: Created MCP server
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MCPServer" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /businesses/{id}/mcp_servers/{serverID}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: serverID, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: getMCPServer
      summary: Get one MCP server connection record
      responses:
        "200":
          description: MCP server
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MCPServer" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateMCPServer
      summary: Partially update an MCP server connection record
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateMCPServerRequest" }
      responses:
        "200":
          description: Updated MCP server
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MCPServer" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
    delete:
      operationId: deleteMCPServer
      summary: Delete an MCP server connection record
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }
  /businesses/{id}/mcp_servers/{serverID}/tools:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: serverID, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: discoverMCPServerTools
      summary: Best-effort live discovery of a server's tools, annotated with their effect policy
      description: >
        Connects to the server and lists its tools, annotating each with the effect the
        agent would see (read | reversible from a per-tool policy, else external — the
        fail-closed default). reachable=false means the server could not be contacted;
        the policy may still be edited by typed tool name. A foreign/unknown server is 404.
      responses:
        "200":
          description: Discovered tools with their effect policy
          content:
            application/json:
              schema:
                type: object
                properties:
                  reachable: { type: boolean }
                  tools:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        description: { type: string }
                        effect: { type: string, enum: [read, reversible, external] }
        "404": { $ref: "#/components/responses/NotFound" }
  /businesses/{id}/mcp_servers/{serverID}/tool_policies:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: serverID, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: listMCPToolPolicies
      summary: List the persisted per-tool effect policies for a server
      responses:
        "200":
          description: Persisted tool policies
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        tool_name: { type: string }
                        effect: { type: string, enum: [read, reversible] }
        "404": { $ref: "#/components/responses/NotFound" }
  /businesses/{id}/mcp_servers/{serverID}/tool_policies/{toolName}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: serverID, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: toolName, in: path, required: true, schema: { type: string } }
    put:
      operationId: setMCPToolPolicy
      summary: Set a tool's effect policy (promote to read/reversible)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [effect]
              properties:
                effect: { type: string, enum: [read, reversible] }
      responses:
        "200":
          description: Policy set
          content:
            application/json:
              schema:
                type: object
                properties:
                  tool_name: { type: string }
                  effect: { type: string, enum: [read, reversible] }
        "400": { $ref: "#/components/responses/ValidationError" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: clearMCPToolPolicy
      summary: Clear a tool's effect policy (revert to external default)
      responses:
        "204": { description: Cleared }
        "404": { $ref: "#/components/responses/NotFound" }
  /businesses/{id}/agents/{agentID}/runs:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: agentID, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      operationId: triggerAgentRun
      summary: Trigger an agent run (executes the bounded run loop as the agent principal)
      description: >
        Requires the agents.run permission at {id}; a lacking permission or an
        invisible business/agent returns the same 404 as an unknown id (no oracle).
        The body is optional — an empty body defaults to a "manual" trigger.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TriggerRunRequest" }
      responses:
        "202":
          description: Run accepted (returns the terminal run record)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Run" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
    get:
      operationId: listAgentRuns
      summary: List an agent's runs (keyset paginated)
      parameters:
        - { name: status, in: query, required: false, schema: { type: string } }
        - { name: window, in: query, required: false, schema: { type: string, enum: [this_month, last_month, last_30_days, custom] } }
        - { name: from, in: query, required: false, schema: { type: string }, description: "custom window start; RFC3339 or YYYY-MM-DD (UTC), inclusive" }
        - { name: to, in: query, required: false, schema: { type: string }, description: "custom window end; RFC3339 or YYYY-MM-DD (UTC). A bare date includes the whole day (half-open [from,to) advances to next midnight); an RFC3339 instant is honored exactly" }
        - { name: cursor, in: query, required: false, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer, default: 50, maximum: 100 }, description: "page size; non-positive -> 50, server caps at 100" }
      responses:
        "200":
          description: A page of runs
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: "#/components/schemas/RunSummary" } }
                  next_cursor: { type: string, nullable: true }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /businesses/{id}/agents/{agentID}/runs/{runID}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: agentID, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: runID, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: getAgentRun
      summary: Get an agent run's status
      description: >
        Requires the agents.run permission at {id}. The run is scoped by {agentID}:
        a run in another business/tenant, OR a run that does not belong to {agentID}
        (even within the same business), returns the same 404 as an unknown id (no
        existence oracle).
      responses:
        "200":
          description: Run
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Run" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /businesses/{id}/approvals:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: listApprovals
      summary: List the business's pending approval queue (US4)
      description: >
        Requires the agents.approve permission at {id} (human-only; never granted to
        the agent_runtime role — an agent must not self-approve). A lacking permission
        or an invisible business returns the same 404 as an unknown id (no oracle).
        The queue is flat (one human works one business's queue), most recent first.
      responses:
        "200":
          description: Pending approval items
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApprovalList" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /businesses/{id}/approvals/{approvalID}/approve:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: approvalID, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      operationId: approveApprovalItem
      summary: Approve a queued agent action (US4)
      description: >
        Requires the agents.approve permission at {id}. Transitions a pending item to
        approved and enqueues its execution on the transactional outbox in one tx; the
        approved tool is then re-invoked exactly-once as the agent principal. An item
        that is already decided or expired returns 409; an unknown/foreign id returns
        the same 404 as an unknown id (no oracle).
      responses:
        "200":
          description: The approved item
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApprovalItem" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /businesses/{id}/accounting:
    get:
      operationId: getBusinessAccounting
      summary: Per-agent token/cost rollup for a business over a window
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: window, in: query, required: false, schema: { type: string, enum: [this_month, last_month, last_30_days, custom] } }
        - { name: from, in: query, required: false, schema: { type: string }, description: "custom window start; RFC3339 or YYYY-MM-DD (UTC), inclusive" }
        - { name: to, in: query, required: false, schema: { type: string }, description: "custom window end; RFC3339 or YYYY-MM-DD (UTC). A bare date includes the whole day (half-open [from,to) advances to next midnight); an RFC3339 instant is honored exactly" }
      responses:
        "200":
          description: Accounting summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AccountingSummary" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /businesses/{id}/ai_credentials:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: listAICredentials
      summary: List AI-provider credentials for a business
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items: { type: array, items: { $ref: "#/components/schemas/AICredential" } }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      operationId: createAICredential
      summary: Create an AI-provider credential
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateAICredentialRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AICredential" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "409": { $ref: "#/components/responses/Conflict" }
        "404": { $ref: "#/components/responses/NotFound" }
  /businesses/{id}/ai_credentials/{credentialID}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: credentialID, in: path, required: true, schema: { type: string, format: uuid } }
    delete:
      operationId: deleteAICredential
      summary: Delete an AI-provider credential
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }
  /businesses/{id}/ai_credentials/codex/device/start:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      operationId: startCodexDeviceConnect
      summary: Begin the OpenAI Codex device-code connect flow
      description: >
        Starts the OAuth device-code flow against auth.openai.com and stores a
        single-use pending row (15m TTL). Poll GET .../codex/device/{pendingID}/status
        with the returned pending_id to complete the connection.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CodexConnectRequest" }
      responses:
        "200":
          description: Device flow started
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CodexDeviceStart" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "502": { $ref: "#/components/responses/BadGateway" }
  /businesses/{id}/ai_credentials/codex/device/{pendingID}/status:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: pendingID, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: getCodexDeviceStatus
      summary: Poll a pending Codex device-code connect flow
      description: >
        Polls auth.openai.com once for the pending device code. On approval, seals
        and persists the resulting openai_codex credential and consumes the
        pending row (single-use). Returns status pending|approved|expired|denied.
      responses:
        "200":
          description: Poll result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CodexConnectStatus" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "502": { $ref: "#/components/responses/BadGateway" }
  /businesses/{id}/ai_credentials/codex/pkce/start:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      operationId: startCodexPKCEConnect
      summary: Begin the OpenAI Codex PKCE (paste-redirect) connect flow
      description: >
        Generates a PKCE verifier/challenge and stores a single-use pending row
        (15m TTL). The returned authorize_url is opened by the user; the resulting
        redirect URL is then posted to .../codex/pkce/exchange.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CodexConnectRequest" }
      responses:
        "200":
          description: PKCE flow started
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CodexPKCEStart" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "404": { $ref: "#/components/responses/NotFound" }
  /businesses/{id}/ai_credentials/codex/pkce/exchange:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      operationId: exchangeCodexPKCEConnect
      summary: Complete the OpenAI Codex PKCE connect flow
      description: >
        Parses the pasted redirect URL, validates state == pending_id, exchanges
        the code with auth.openai.com, and — on success — seals and persists the
        resulting openai_codex credential, consuming the pending row (single-use).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CodexPKCEExchangeRequest" }
      responses:
        "200":
          description: Exchange result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CodexConnectStatus" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "502": { $ref: "#/components/responses/BadGateway" }
  /businesses/{id}/approvals/{approvalID}/deny:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: approvalID, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      operationId: denyApprovalItem
      summary: Deny a queued agent action (US4)
      description: >
        Requires the agents.approve permission at {id}. Transitions a pending item to
        denied; the action never executes. An item that is already decided or expired
        returns 409; an unknown/foreign id returns the same 404 as an unknown id (no
        oracle).
      responses:
        "200":
          description: The denied item
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApprovalItem" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    NotFound:
      description: Not found (also returned for lacking permission / invisible business — no oracle)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    ValidationError:
      description: Invalid request body
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: >
        Conflict (duplicate agent name in the business; or for a run trigger: the
        agent is disabled or its monthly budget is exceeded)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    BadGateway:
      description: >
        Upstream provider error (e.g. auth.openai.com failed or timed out during
        a Codex connect call)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
    Agent:
      type: object
      required: [id, business_id, principal_id, name, provider, model, system_prompt, allowed_tools, autonomy_mode, enabled, monthly_budget_cents, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        business_id: { type: string, format: uuid }
        principal_id: { type: string, format: uuid }
        name: { type: string }
        provider: { type: string, enum: [anthropic, openai, ollama, vllm, openrouter, huggingface, openai_codex] }
        model: { type: string }
        system_prompt: { type: string }
        allowed_tools: { type: array, items: { type: string } }
        web_allowed_domains:
          type: array
          items: { type: string }
          description: >-
            Opt-in domain allowlist scoping the OpenRouter web_fetch server tool.
            Empty (default) means web fetching is not enabled for the agent.
        autonomy_mode: { type: integer, enum: [1, 2, 3] }
        enabled: { type: boolean }
        monthly_budget_cents: { type: integer, minimum: 0, maximum: 2147483647 }
        retriage_on_reply:
          type: boolean
          default: false
          description: >-
            When true, a customer reply on an existing ticket re-invokes this agent
            (bounded by a per-ticket hourly cap). Default false.
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    AgentList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Agent" }
    AgentTool:
      type: object
      description: A read-only tool descriptor; the catalog of tools an agent may be allowed.
      required: [name, description, effect, required_perm]
      properties:
        name: { type: string }
        description: { type: string }
        effect: { type: string }
        required_perm: { type: string }
    AgentToolList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/AgentTool" }
    AgentModel:
      type: object
      description: A model the agent runtime can be configured to use.
      required: [provider, model_id]
      properties:
        provider: { type: string }
        model_id: { type: string }
    AgentModelList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/AgentModel" }
    CreateAgentRequest:
      type: object
      required: [name, provider, model]
      properties:
        name: { type: string, minLength: 1 }
        provider: { type: string, enum: [anthropic, openai, ollama, vllm, openrouter, huggingface, openai_codex] }
        model: { type: string, minLength: 1 }
        system_prompt: { type: string }
        allowed_tools: { type: array, items: { type: string } }
        web_allowed_domains:
          type: array
          items: { type: string }
          description: >-
            Opt-in domain allowlist scoping the OpenRouter web_fetch server tool.
            Empty (default) means web fetching is not enabled for the agent.
        autonomy_mode: { type: integer, enum: [1, 2, 3], default: 1 }
        enabled: { type: boolean, default: true }
        monthly_budget_cents: { type: integer, minimum: 0, maximum: 2147483647, default: 0 }
        retriage_on_reply:
          type: boolean
          default: false
          description: >-
            When true, a customer reply on an existing ticket re-invokes this agent
            (bounded by a per-ticket hourly cap). Default false.
    UpdateAgentRequest:
      type: object
      description: Partial update — omit a field to leave it unchanged. provider is immutable.
      properties:
        name: { type: string, minLength: 1 }
        model: { type: string, minLength: 1 }
        system_prompt: { type: string }
        allowed_tools: { type: array, items: { type: string } }
        web_allowed_domains:
          type: array
          items: { type: string }
          description: >-
            Opt-in domain allowlist scoping the OpenRouter web_fetch server tool.
            Empty (default) means web fetching is not enabled for the agent.
        autonomy_mode: { type: integer, enum: [1, 2, 3] }
        enabled: { type: boolean }
        monthly_budget_cents: { type: integer, minimum: 0, maximum: 2147483647 }
        retriage_on_reply:
          type: boolean
          default: false
          description: >-
            When true, a customer reply on an existing ticket re-invokes this agent
            (bounded by a per-ticket hourly cap). Default false.
    MCPServer:
      type: object
      description: >
        An MCP server connection record. Auth credentials (bearer token) are
        write-only and are never returned in any response — only the presence of
        auth is not exposed in this schema.
      required: [id, business_id, name, url, enabled, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        business_id: { type: string, format: uuid }
        name: { type: string }
        url: { type: string, format: uri }
        enabled: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    MCPServerList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/MCPServer" }
    CreateMCPServerRequest:
      type: object
      required: [name, url]
      properties:
        name: { type: string, minLength: 1 }
        url: { type: string, format: uri }
        auth_token:
          type: string
          writeOnly: true
          description: >
            Optional bearer token sealed at rest. Write-only — never returned in
            any response.
        enabled: { type: boolean, default: true }
    UpdateMCPServerRequest:
      type: object
      description: Partial update — omit a field to leave it unchanged.
      properties:
        name: { type: string, minLength: 1 }
        url: { type: string, format: uri }
        auth_token:
          type: string
          writeOnly: true
          description: >
            Replace the sealed bearer token. Empty string clears auth. Write-only
            — never returned in any response.
        enabled: { type: boolean }
    TriggerRunRequest:
      type: object
      description: Optional run trigger. An empty body defaults to a manual trigger.
      properties:
        trigger: { type: string, enum: [manual, event], default: manual }
        target_type: { type: string }
        target_id: { type: string, format: uuid }
    Run:
      type: object
      required: [id, agent_id, trigger, status, tokens_in, tokens_out, cost_cents, correlation_id]
      properties:
        id: { type: string, format: uuid }
        agent_id: { type: string, format: uuid }
        trigger: { type: string, enum: [manual, event] }
        status: { type: string, enum: [queued, running, awaiting_approval, succeeded, failed] }
        tokens_in: { type: integer, minimum: 0 }
        tokens_out: { type: integer, minimum: 0 }
        cost_cents: { type: integer, minimum: 0 }
        correlation_id: { type: string }
        error: { type: string, nullable: true }
    RunSummary:
      allOf:
        - $ref: "#/components/schemas/Run"
        - type: object
          required: [created_at]
          properties:
            created_at: { type: string, format: date-time }
    ApprovalItem:
      type: object
      description: >
        A gated agent action awaiting (or past) a human decision. The tool args,
        tenant_root_id, and deciding principal are deliberately omitted from the wire
        shape — they are internal and would leak the planned action payload / tenant
        internals to the queue UI.
      required: [id, agent_run_id, tool, effect_class, state, expires_at]
      properties:
        id: { type: string, format: uuid }
        agent_run_id: { type: string, format: uuid }
        tool: { type: string }
        effect_class: { type: integer, description: "0=read, 1=reversible, 2=external, 3=irreversible" }
        state: { type: string, enum: [pending, approved, denied, executed, expired] }
        expires_at: { type: string, format: date-time }
    ApprovalList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ApprovalItem" }
    AccountingSummary:
      type: object
      required: [window, totals, agents]
      properties:
        window:
          type: object
          required: [from, to]
          properties:
            from: { type: string, format: date-time }
            to: { type: string, format: date-time }
        totals:
          type: object
          required: [cost_cents, tokens_in, tokens_out, run_count]
          properties:
            cost_cents: { type: integer }
            tokens_in: { type: integer }
            tokens_out: { type: integer }
            run_count: { type: integer }
        agents:
          type: array
          items: { $ref: "#/components/schemas/AgentUsage" }
    AgentUsage:
      type: object
      required: [agent_id, name, monthly_budget_cents, run_count, tokens_in, tokens_out, cost_cents]
      properties:
        agent_id: { type: string, format: uuid }
        name: { type: string }
        monthly_budget_cents: { type: integer }
        run_count: { type: integer }
        tokens_in: { type: integer }
        tokens_out: { type: integer }
        cost_cents: { type: integer }
        budget_pct: { type: integer, nullable: true }
    AICredential:
      type: object
      description: Non-secret view of a stored AI-provider credential. The API key is write-only and never returned.
      required: [id, business_id, provider, default_model, allow_private_base_url]
      properties:
        id: { type: string, format: uuid }
        business_id: { type: string, format: uuid }
        provider: { type: string, enum: [anthropic, openai, ollama, vllm, openrouter, huggingface, openai_codex] }
        base_url: { type: string }
        default_model: { type: string }
        allow_private_base_url: { type: boolean }
        max_concurrent_lanes: { type: integer, minimum: 1, maximum: 16, default: 4 }
        created_at: { type: string }
        updated_at: { type: string }
        chatgpt_plan:
          type: string
          description: >-
            openai_codex only, empty for every other provider. The ChatGPT
            subscription plan reported by the last successful token refresh
            (e.g. "plus", "pro").
        connection_status:
          type: string
          enum: [connected, disconnected]
          description: >-
            openai_codex only, empty for every other provider. "connected"
            when a usable token exists (sealed API key or OAuth refresh
            token); "disconnected" otherwise. Never returns the api key —
            this is a derived status, not the secret itself.
        oauth_access_expiry:
          type: string
          description: >-
            openai_codex only, empty for every other provider. Expiry of the
            last-minted OAuth access token.
    CreateAICredentialRequest:
      type: object
      required: [provider, api_key, default_model]
      properties:
        provider: { type: string, enum: [anthropic, openai, ollama, vllm, openrouter, huggingface, openai_codex] }
        api_key:
          type: string
          writeOnly: true
          description: Write-only. Sealed at rest, never returned.
        base_url:
          type: string
          description: Optional. For openai-compatible / self-host endpoints.
        default_model: { type: string }
        allow_private_base_url:
          type: boolean
          description: Opt-in to a loopback/RFC1918 base_url (SSRF trust grant).
        max_concurrent_lanes:
          type: integer
          minimum: 1
          maximum: 16
          default: 4
          description: >-
            How many code-review lanes may hit this endpoint at once. A single-GPU
            self-host sets this to 1; cloud is fine at 4.
        chatgpt_account_id:
          type: string
          description: ChatGPT-Account-Id for an openai_codex credential (required when provider is openai_codex).
    CodexConnectRequest:
      type: object
      description: Shared request body for the codex device/start and pkce/start endpoints.
      required: [default_model]
      properties:
        default_model: { type: string }
        base_url:
          type: string
          description: Optional. Overrides the default ChatGPT Codex backend endpoint.
        max_concurrent_lanes:
          type: integer
          minimum: 1
          maximum: 16
          default: 4
    CodexDeviceStart:
      type: object
      description: Result of starting the OpenAI device-code flow.
      required: [pending_id, user_code, verification_uri, verification_uri_complete, interval, expires_in]
      properties:
        pending_id: { type: string, format: uuid }
        user_code: { type: string }
        verification_uri: { type: string }
        verification_uri_complete: { type: string }
        interval: { type: integer, description: Poll interval in seconds. }
        expires_in: { type: integer, description: Device code TTL in seconds. }
    CodexPKCEStart:
      type: object
      description: Result of starting the PKCE (paste-redirect) flow.
      required: [pending_id, authorize_url]
      properties:
        pending_id: { type: string, format: uuid }
        authorize_url: { type: string }
    CodexPKCEExchangeRequest:
      type: object
      required: [pending_id, redirect_url]
      properties:
        pending_id: { type: string, format: uuid }
        redirect_url:
          type: string
          description: The full redirect URL the user was sent to, pasted back verbatim (must carry code and a state matching pending_id).
    CodexConnectStatus:
      type: object
      description: Poll/exchange result. credential_id is present only once status is approved.
      required: [status]
      properties:
        status: { type: string, enum: [pending, approved, expired, denied] }
        credential_id: { type: string, format: uuid }
