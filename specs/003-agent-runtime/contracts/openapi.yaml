openapi: 3.1.0
info:
  title: manyforge Agent Runtime API
  version: 0.1.0
  description: >
    Spec 003 — Agent Runtime & AI Gateway. US2 surface: business-bound agent
    definition CRUD, gated by the agents.configure permission. Authorization and
    existence are indistinguishable — a lacking permission or an invisible business
    returns the same 404 as an unknown id (no existence oracle).
servers:
  - url: /api/v1
security:
  - bearerAuth: []
paths:
  /businesses/{id}/agents:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: listAgents
      summary: List agent definitions for a business
      responses:
        "200":
          description: Agent list
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentList" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      operationId: createAgent
      summary: Create an agent definition (creates its agent principal)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateAgentRequest" }
      responses:
        "201":
          description: Created agent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Agent" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /businesses/{id}/agents/{agentID}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: agentID, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: getAgent
      summary: Get one agent definition
      responses:
        "200":
          description: Agent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Agent" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateAgent
      summary: Partially update an agent definition
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateAgentRequest" }
      responses:
        "200":
          description: Updated agent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Agent" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
    delete:
      operationId: deleteAgent
      summary: Delete an agent definition and its agent principal
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }
  /businesses/{id}/agents/{agentID}/runs:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: agentID, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      operationId: triggerAgentRun
      summary: Trigger an agent run (executes the bounded run loop as the agent principal)
      description: >
        Requires the agents.run permission at {id}; a lacking permission or an
        invisible business/agent returns the same 404 as an unknown id (no oracle).
        The body is optional — an empty body defaults to a "manual" trigger.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TriggerRunRequest" }
      responses:
        "202":
          description: Run accepted (returns the terminal run record)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Run" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /businesses/{id}/agents/{agentID}/runs/{runID}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: agentID, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: runID, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: getAgentRun
      summary: Get an agent run's status
      description: >
        Requires the agents.run permission at {id}; a run in another business/tenant
        returns the same 404 as an unknown id (no oracle).
      responses:
        "200":
          description: Run
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Run" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    NotFound:
      description: Not found (also returned for lacking permission / invisible business — no oracle)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    ValidationError:
      description: Invalid request body
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: >
        Conflict (duplicate agent name in the business; or for a run trigger: the
        agent is disabled or its monthly budget is exceeded)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }
    Agent:
      type: object
      required: [id, business_id, principal_id, name, provider, model, system_prompt, allowed_tools, autonomy_mode, enabled, monthly_budget_cents, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        business_id: { type: string, format: uuid }
        principal_id: { type: string, format: uuid }
        name: { type: string }
        provider: { type: string, enum: [anthropic, openai, ollama, vllm] }
        model: { type: string }
        system_prompt: { type: string }
        allowed_tools: { type: array, items: { type: string } }
        autonomy_mode: { type: integer, enum: [1, 2, 3] }
        enabled: { type: boolean }
        monthly_budget_cents: { type: integer, minimum: 0, maximum: 2147483647 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    AgentList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Agent" }
    CreateAgentRequest:
      type: object
      required: [name, provider, model]
      properties:
        name: { type: string, minLength: 1 }
        provider: { type: string, enum: [anthropic, openai, ollama, vllm] }
        model: { type: string, minLength: 1 }
        system_prompt: { type: string }
        allowed_tools: { type: array, items: { type: string } }
        autonomy_mode: { type: integer, enum: [1, 2, 3], default: 1 }
        enabled: { type: boolean, default: true }
        monthly_budget_cents: { type: integer, minimum: 0, maximum: 2147483647, default: 0 }
    UpdateAgentRequest:
      type: object
      description: Partial update — omit a field to leave it unchanged. provider is immutable.
      properties:
        name: { type: string, minLength: 1 }
        model: { type: string, minLength: 1 }
        system_prompt: { type: string }
        allowed_tools: { type: array, items: { type: string } }
        autonomy_mode: { type: integer, enum: [1, 2, 3] }
        enabled: { type: boolean }
        monthly_budget_cents: { type: integer, minimum: 0, maximum: 2147483647 }
    TriggerRunRequest:
      type: object
      description: Optional run trigger. An empty body defaults to a manual trigger.
      properties:
        trigger: { type: string, enum: [manual, event], default: manual }
        target_type: { type: string }
        target_id: { type: string, format: uuid }
    Run:
      type: object
      required: [id, agent_id, trigger, status, tokens_in, tokens_out, cost_cents, correlation_id]
      properties:
        id: { type: string, format: uuid }
        agent_id: { type: string, format: uuid }
        trigger: { type: string, enum: [manual, event] }
        status: { type: string, enum: [queued, running, awaiting_approval, succeeded, failed] }
        tokens_in: { type: integer, minimum: 0 }
        tokens_out: { type: integer, minimum: 0 }
        cost_cents: { type: integer, minimum: 0 }
        correlation_id: { type: string }
        error: { type: string, nullable: true }
