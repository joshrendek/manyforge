openapi: 3.1.0
info:
  title: manyforge Coding & Review API
  version: 0.1.0
  description: Spec 007 slice 1 — repo-connector registration and code-review trigger/get.

paths:
  /businesses/{id}/repo-connectors:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      operationId: createRepoConnector
      summary: Register a GitHub repo connector
      description: >
        Creates a repo-connector record that binds a GitHub repository to a
        business. Gated by connectors.manage. Returns 201 with the new
        connector's id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRepoConnectorInput'
      responses:
        "201":
          description: Repo connector created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IDResponse'
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          description: Business not found or caller lacks connectors.manage
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    get:
      operationId: listRepoConnectors
      summary: List repo connectors for a business
      description: >
        Returns credential-free summaries of all repo connectors registered for
        the business. Gated by connectors.manage.
      responses:
        "200":
          description: List of repo connectors
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/RepoConnectorSummary'
        "404":
          description: Business not found or caller lacks connectors.manage
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /businesses/{id}/repo-connectors/{rcID}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: rcID
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      operationId: deleteRepoConnector
      summary: Delete a repo connector
      description: >
        Deletes the specified repo connector. Gated by connectors.manage.
        Returns 204 on success.
      responses:
        "204":
          description: Repo connector deleted
        "404":
          description: Repo connector not found or caller lacks connectors.manage
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /businesses/{id}/code-reviews:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: listCodeReviews
      summary: List code reviews for a business
      description: >
        Returns code review records for the business, newest-first.
        Gated by agents.run.
      responses:
        "200":
          description: List of code reviews
          content:
            application/json:
              schema:
                type: object
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/CodeReview'
        "404":
          description: Business not found or caller lacks agents.run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      operationId: triggerCodeReview
      summary: Trigger a code review of a pull request
      description: >
        Enqueues a code-review run for the given PR using the specified agent
        and repo connector. Gated by agents.run. Returns 202 with the review
        record's id and initial status.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TriggerCodeReviewInput'
      responses:
        "202":
          description: Code review accepted and queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodeReviewAccepted'
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          description: Business, agent, or repo connector not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /businesses/{id}/code-reviews/{reviewID}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: reviewID
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getCodeReview
      summary: Get a code review record
      description: >
        Returns the current state of a code-review run (status, review URL if
        complete, findings summary). Gated by agents.run.
      responses:
        "200":
          description: Code review record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodeReview'
        "404":
          description: Code review not found or caller lacks agents.run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    CreateRepoConnectorInput:
      type: object
      required:
        - type
        - display_name
        - base_url
        - repo
        - api_token
      properties:
        type:
          type: string
          description: Connector type (e.g. "github")
        display_name:
          type: string
          description: Human-readable name for the connector
        base_url:
          type: string
          description: Base URL of the GitHub API or GitHub Enterprise host
        repo:
          type: string
          description: Repository in "owner/name" format
        api_token:
          type: string
          description: GitHub personal access token or app token
        allow_private_base_url:
          type: boolean
          description: Allow non-public (e.g. local/enterprise) base URLs (testing only)

    TriggerCodeReviewInput:
      type: object
      required:
        - agent_id
        - repo_connector_id
        - pr_number
      properties:
        agent_id:
          type: string
          format: uuid
        repo_connector_id:
          type: string
          format: uuid
        pr_number:
          type: integer
          minimum: 1

    IDResponse:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          format: uuid

    CodeReviewAccepted:
      type: object
      required:
        - id
        - status
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
        review_url:
          type: string
          nullable: true

    CodeReview:
      type: object
      required:
        - id
        - status
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
        review_url:
          type: string
          nullable: true
        summary:
          type: string
        pr_number:
          type: integer
        model:
          type: string
        repo:
          type: string
          description: "owner/name of the review's connector (normally always present)"
        cost_cents:
          type: integer
          format: int64
        findings:
          type: array
          items:
            $ref: '#/components/schemas/Finding'
        created_at:
          type: string
          format: date-time
        posted_at:
          type: string
          format: date-time
          nullable: true
        progress:
          type: object
          nullable: true
          description: >-
            Live progress snapshot for a running review (phase/tokens/preview);
            omitted for pending and terminal reviews.
          properties:
            phase:
              type: string
            tokens:
              type: integer
            preview:
              type: string

    Finding:
      type: object
      properties:
        file:
          type: string
        line:
          type: integer
        severity:
          type: string
        title:
          type: string
        detail:
          type: string

    RepoConnectorSummary:
      type: object
      required:
        - id
        - type
        - display_name
        - base_url
        - repo
        - status
        - created_at
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
        display_name:
          type: string
        base_url:
          type: string
        repo:
          type: string
        allow_private_base_url:
          type: boolean
        status:
          type: string
        created_at:
          type: string
          format: date-time
        auto_managed:
          type: boolean
          description: True for github_app connectors — provisioned/removed by the GitHub App install, not by Create/Delete.

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
