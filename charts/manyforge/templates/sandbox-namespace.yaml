{{- if .Values.sandbox.enabled }}
# The code-review sandbox namespace (Task 4.5, Phase 4 k8s-native sandbox).
# KubeRunner submits one hardened Job per review here — see
# internal/agents/coding/sandbox/kube/runner.go — never in the app's own
# release namespace. `restricted` Pod Security Standard enforcement is a second
# guard on top of the per-Job SecurityContext buildJob already sets
# (runAsNonRoot, dropped capabilities, read-only root fs, …): even a future Job
# spec regression that forgets one of those fields is rejected by the API
# server instead of silently running under weaker isolation.
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.sandbox.namespace }}
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
{{- end }}
