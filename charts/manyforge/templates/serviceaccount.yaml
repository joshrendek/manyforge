apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "manyforge.fullname" . }}
  labels:
    {{- include "manyforge.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# automountServiceAccountToken is true: Phase 4 needs the in-cluster
# Kubernetes API (to launch per-run sandbox Jobs). The RBAC Role/RoleBinding
# granting that access is added in Phase 4 — this SA has no permissions yet.
automountServiceAccountToken: true
