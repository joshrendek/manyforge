apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "manyforge.fullname" . }}
  labels:
    {{- include "manyforge.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# automountServiceAccountToken is true: kube-mode sandbox reviews need the
# in-cluster Kubernetes API (to launch per-run sandbox Jobs). The RBAC
# Role/RoleBinding granting that access (scoped to the sandbox namespace only)
# lives in rbac.yaml.
automountServiceAccountToken: true
