# Default values for the manyforge chart.
# Zero secrets live in this file, or in any template — every credential is
# wired via env.valueFrom.secretKeyRef against an out-of-band Secret NAME
# (see `secrets:` below). The Secrets themselves are created outside this
# chart (e.g. SealedSecrets/External Secrets/manual `kubectl create secret`).

nameOverride: ""
fullnameOverride: ""

replicaCount: 1
# Default is 1, not N. Background workers (notify/reconcile tickers etc.) claim
# work with `SELECT ... FOR UPDATE SKIP LOCKED`, which is LIKELY safe to run
# from multiple replicas concurrently (no double-claim), but this has NOT been
# load-tested with replicaCount > 1 yet. Bump only after that's verified.

image:
  repository: ghcr.io/joshrendek/manyforge
  pullPolicy: IfNotPresent
  # CI publishes main-<sha>-<ts> tags (see .github workflows). The trailing
  # comment is a Flux Image Automation setter marker: Flux rewrites this field
  # in place whenever a new image matching the `manyforge` ImagePolicy lands.
  tag: latest # {"$imagepolicy": "flux-system:manyforge:tag"}

# Pulled by both the app Deployment and the migrate Job.
# NOTE: this Secret is namespace-scoped, so it must ALSO exist, under the SAME
# name (ghcr-auth by default), in the sandbox namespace (sandbox.namespace
# below, e.g. manyforge-sandbox) — NOT only in this release namespace. The
# egress-proxy Deployment (sandbox-egress-proxy.yaml) references
# .Values.imagePullSecrets and every KubeRunner-created review Job references
# sandbox.pullSecret below (threaded to MANYFORGE_SANDBOX_PULL_SECRET, see
# configmap.yaml), both of which are created IN the sandbox namespace, so both
# pulls fail until that second copy of the secret is created there too. Keep
# this list's name(s) and sandbox.pullSecret in sync unless you intentionally
# use a different pull secret for sandbox Jobs.
imagePullSecrets:
  - name: ghcr-auth

serviceAccount:
  # The app talks to the Kubernetes API for kube-mode sandbox reviews
  # (in-cluster Jobs). The RBAC Role/RoleBinding granting that access lives in
  # rbac.yaml, scoped to the sandbox namespace only.
  annotations: {}

podAnnotations: {}

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  host: hub.bluescripts.net
  # HTTP only — no tls: block, no cert-manager annotation. Cloudflare
  # terminates TLS in front of the cluster.
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "30m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
  # /metrics (Go expvar) is otherwise publicly reachable via the `/` catch-all
  # route; deny it at the ingress. Requires the cluster's ingress-nginx to run
  # with `allowSnippetAnnotations: true`.
  denyMetrics: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Pod-level security context. Paired with securityContext below (container-
# level fields like readOnlyRootFilesystem aren't valid at the pod level).
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

# Container-level security context: non-root, read-only root filesystem (the
# app writes scratch data to the /tmp emptyDir instead), no privilege
# escalation, every Linux capability dropped.
securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# ---------------------------------------------------------------------------
# Non-secret application config (internal/platform/config/config.go), rendered
# into a ConfigMap and consumed via envFrom.
# ---------------------------------------------------------------------------

addr: ":8080"

jwt:
  issuer: manyforge
  audience: manyforge-api
  # REQUIRED — no safe empty default. Single source of truth for
  # MANYFORGE_JWT_ACTIVE_KID: the kid of the persistent signing key held in
  # secrets.jwt (below). Must match whatever kid the actual PEM in that
  # Secret was minted with. Left empty, the app silently falls back to
  # ephemeral per-pod JWT keys, invalidating every login on each
  # restart/replica. The chart fails to render (`required`) until this is set.
  activeKid: ""

accessTokenTTL: 15m

# REQUIRED — no safe empty default. CIDR allowed to set the client IP via
# X-Forwarded-For (e.g. the cluster pod CIDR ingress-nginx runs in). Without
# it, rate-limiting and audit logging see ingress-nginx's pod IP instead of
# the real client IP, collapsing all clients into one rate-limit bucket. The
# chart fails to render (`required`) until this is set.
trustedProxyCidr: ""

# GitHub App integration (spec 009). Both OPTIONAL — empty leaves the feature
# disabled (setup routes 404; the App master key in secrets.masterKeys.githubAppKey
# separately gates whether the integration is mounted at all).
#   - instanceOperatorPrincipal: the operator's principal UUID permitted to run the
#     in-app "create GitHub App" manifest flow (empty → those routes 404 for all).
#   - publicBaseURL: externally-reachable base for the GitHub webhook + OAuth
#     redirect URLs baked into the App manifest (e.g. https://hub.bluescripts.net).
instanceOperatorPrincipal: ""
publicBaseURL: ""

sandbox:
  # Consumed by the code-review sandbox runner (internal/agents/coding/sandbox)
  # and, below, by this chart's own sandbox namespace/egress-proxy/RBAC
  # templates (Task 4.5, Phase 4 k8s-native sandbox).
  enabled: true
  # A dedicated namespace (restricted Pod Security Standard) keeps per-review
  # Jobs — and the RBAC granting the app access to create them — isolated from
  # the app's own release namespace. See sandbox-namespace.yaml, rbac.yaml.
  # Threaded to the app as MANYFORGE_SANDBOX_NAMESPACE (configmap.yaml) — the
  # single source of truth internal/platform/config/config.go's SandboxNamespace
  # reads, so the app and this chart can never disagree on which namespace the
  # KubeRunner targets. REMINDER: imagePullSecrets (above) must also be copied
  # into this namespace — see the note there.
  namespace: manyforge-sandbox
  image: "ghcr.io/joshrendek/manyforge/opencode-sandbox:latest"
  egressProxyImage: "ghcr.io/joshrendek/manyforge/egress-proxy:latest"
  # Comma-separated allowlist of provider hosts (host or host:port) the mf-egress-proxy
  # permits (both CONNECT for TLS and plain-HTTP forwarding). Every AI credential's host
  # must appear here or its reviews are rejected up front (manyforge-9er) — including
  # local providers (vLLM/Ollama/LM Studio), which now route through this same sandbox
  # egress path rather than a direct-POST bypass. To enable a local provider, add its
  # host:port (e.g. "192.168.2.241:1234") to this list. The app reads this same value as
  # MANYFORGE_SANDBOX_EGRESS_ALLOW (see configmap.yaml). Private/RFC1918/loopback hosts
  # are additionally gated at the service layer by the credential's own
  # allow_private_base_url opt-in — being on this allowlist is necessary but not
  # sufficient for a private host. Do NOT add the deployment-specific LAN IP here: the
  # default below stays cloud-only; the actual LAN host lives only in the hub's Flux
  # HelmRelease values (out of this repo).
  egressAllow: "api.anthropic.com,openrouter.ai,api.openai.com"
  mode: "kube"
  # Name of the image-pull Secret the KubeRunner attaches to every per-review
  # Job's PodSpec (internal/platform/config/config.go SandboxPullSecret, env
  # MANYFORGE_SANDBOX_PULL_SECRET). MUST match a Secret of this name that
  # already exists in `namespace` above (the sandbox namespace) — see the
  # imagePullSecrets note above for why that's a separate copy from the
  # release-namespace one.
  pullSecret: ghcr-auth

# ---------------------------------------------------------------------------
# Secret wiring — NAMES AND KEYS ONLY. Every value below points at a Secret
# that must already exist in the release namespace; nothing here is (or may
# ever become) a literal credential.
# ---------------------------------------------------------------------------
secrets:
  # App-role DSN (non-superuser, non-BYPASSRLS) -> MANYFORGE_DATABASE_URL.
  database:
    secretName: manyforge-database
    key: url
  # PKCS8 Ed25519 private key PEM -> MANYFORGE_JWT_SIGNING_KEY_PEM. Its kid
  # MUST match jwt.activeKid above.
  jwt:
    secretName: manyforge-jwt
    key: active.pem
  # AES-256 at-rest master keys, one per subsystem, all in a single Secret.
  masterKeys:
    secretName: manyforge-masterkeys
    aiKey: ai
    connectorKey: connector
    dkimKey: dkim
    mcpKey: mcp
    # AES-256 key sealing the GitHub App private key + client/webhook secrets at
    # rest (spec 009). Optional: if this key is absent from the Secret the app
    # boots with the GitHub App integration disabled.
    githubAppKey: github-app
  # Owner-role DSN for the migrate Job — distinct from the app DSN above,
  # since migrations need DDL privileges the app role should not have.
  migrateDatabase:
    secretName: manyforge-migrate-database
    key: url
  # Optional — rendered only when secretName is set (opt-in). Leave unset to
  # skip: the app degrades gracefully (outbound mail falls back to the dev
  # LogSender; inbound webhook/bounce signature verification fail-closed).
  smtp:
    secretName: ""
    userKey: user
    passKey: pass
  inbound:
    secretName: ""
    webhookSecretKey: webhook-secret
    bounceSecretKey: bounce-secret
